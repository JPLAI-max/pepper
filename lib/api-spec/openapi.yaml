openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: Financial snapshot
  - name: goals
    description: User goals
  - name: roadmap
    description: Personalized roadmap steps
  - name: documents
    description: Document filing system
  - name: opportunities
    description: Lending and investment marketplace
  - name: dashboard
    description: Dashboard aggregates and readiness scores
  - name: openai
    description: Pepper AI chat and voice operations
  - name: storage
    description: Object storage upload and retrieval
  - name: auth
    description: Account creation, login, and session
paths:
  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create an account and start a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "201":
          description: Account created, session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in and start a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Logged in, session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: End the current session
      responses:
        "204":
          description: Logged out
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the current session's user (null when anonymous)
      responses:
        "200":
          description: Current auth state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthState"
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get the financial snapshot
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update the financial snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /goals:
    get:
      operationId: listGoals
      tags: [goals]
      summary: List goals
      responses:
        "200":
          description: Goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Goal"
    post:
      operationId: createGoal
      tags: [goals]
      summary: Create a goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalInput"
      responses:
        "201":
          description: Created goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
  /goals/{id}:
    patch:
      operationId: updateGoal
      tags: [goals]
      summary: Update a goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalUpdate"
      responses:
        "200":
          description: Updated goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteGoal
      tags: [goals]
      summary: Delete a goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /roadmap:
    get:
      operationId: getRoadmap
      tags: [roadmap]
      summary: Get the structured deterministic roadmap
      responses:
        "200":
          description: Structured roadmap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoadmapPlan"
  /roadmap/{id}:
    patch:
      operationId: updateRoadmapStep
      tags: [roadmap]
      summary: Update a roadmap step
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoadmapUpdate"
      responses:
        "200":
          description: Updated step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoadmapStep"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      responses:
        "200":
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
  /documents/{id}:
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update a document (move bucket / reorder / rename)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUpdate"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /opportunities:
    get:
      operationId: listOpportunities
      tags: [opportunities]
      summary: List lending and investment opportunities
      responses:
        "200":
          description: Opportunities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Opportunity"
  /opportunities/matches:
    get:
      operationId: getOpportunityMatches
      tags: [opportunities]
      summary: Deterministic educational opportunity matches for the session user
      responses:
        "200":
          description: Matched tool categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityMatches"

  /scores:
    get:
      operationId: getReadinessScores
      tags: [dashboard]
      summary: Get readiness scores computed from the financial snapshot
      responses:
        "200":
          description: Scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReadinessScore"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Aggregated dashboard summary
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /openai/conversations:
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
  /openai/conversations/{id}/voice-messages:
    post:
      operationId: sendOpenaiVoiceMessage
      tags: [openai]
      summary: Send audio and receive a streaming transcript and voice response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiVoiceMessageInput"
      responses:
        "200":
          description: SSE stream of transcript and audio chunks
          content:
            text/event-stream: {}
  /openai/transcribe:
    post:
      operationId: transcribeOpenaiAudio
      tags: [openai]
      summary: Transcribe audio to text (dictation, no AI reply)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiTranscribeInput"
      responses:
        "200":
          description: Transcribed text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiTranscribeOutput"
  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL for a direct file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlInput"
      responses:
        "200":
          description: Presigned upload URL and normalized object path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlOutput"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AuthCredentials:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - email
        - password
    AuthUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
      required:
        - id
        - email
    AuthSession:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - user
    AuthState:
      type: object
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"
      required:
        - user

    RequestUploadUrlInput:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required:
        - name
        - size
        - contentType
    RequestUploadUrlOutput:
      type: object
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
        metadata:
          $ref: "#/components/schemas/RequestUploadUrlInput"
      required:
        - uploadURL
        - objectPath
        - metadata

    Profile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        displayName:
          type: string
        monthlyIncome:
          type: integer
        monthlyExpenses:
          type: integer
        cashSavings:
          type: integer
        otherAssets:
          type: integer
        totalDebt:
          type: integer
        creditScore:
          type: integer
        preferredVoice:
          type: string
        onboarded:
          type: boolean
        nextAction:
          type: [string, "null"]
        readyForReveal:
          type: boolean
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - displayName
        - monthlyIncome
        - monthlyExpenses
        - cashSavings
        - otherAssets
        - totalDebt
        - creditScore
        - preferredVoice
        - onboarded
        - readyForReveal
        - updatedAt
    ProfileUpdate:
      type: object
      properties:
        displayName:
          type: string
        monthlyIncome:
          type: integer
        monthlyExpenses:
          type: integer
        cashSavings:
          type: integer
        otherAssets:
          type: integer
        totalDebt:
          type: integer
        creditScore:
          type: integer
        preferredVoice:
          type: string
          enum: ["female", "male"]
        onboarded:
          type: boolean

    Goal:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        targetAmount:
          type: integer
        currentAmount:
          type: integer
        targetDate:
          type: ["string", "null"]
        status:
          type: string
        priority:
          type: integer
        note:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - category
        - targetAmount
        - currentAmount
        - status
        - priority
        - createdAt
    GoalInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        category:
          type: string
          enum: ["homeownership", "investing", "passive_income", "credit", "debt", "wealth"]
        targetAmount:
          type: integer
        currentAmount:
          type: integer
        targetDate:
          type: string
        status:
          type: string
          enum: ["active", "achieved", "paused"]
        priority:
          type: integer
        note:
          type: string
      required:
        - title
        - category
    GoalUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        category:
          type: string
          enum: ["homeownership", "investing", "passive_income", "credit", "debt", "wealth"]
        targetAmount:
          type: integer
        currentAmount:
          type: integer
        targetDate:
          type: string
        status:
          type: string
          enum: ["active", "achieved", "paused"]
        priority:
          type: integer
        note:
          type: string

    RoadmapStep:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
        orderIndex:
          type: integer
        actionLabel:
          type: ["string", "null"]
        goalId:
          type: ["integer", "null"]
        horizon:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - status
        - orderIndex
        - createdAt
    RoadmapUpdate:
      # The roadmap is engine-owned: a step's content/order/horizon are derived
      # deterministically and reconciled on recompute, so the only field a
      # client may PATCH is its progress status.
      type: object
      properties:
        status:
          type: string
          enum: ["todo", "in_progress", "done"]
      required:
        - status

    RoadmapPosition:
      type: object
      properties:
        goalTitle:
          type: ["string", "null"]
        goalCategory:
          type: ["string", "null"]
        focusScore:
          type: ["object", "null"]
          properties:
            key:
              type: string
            value:
              type: integer
            band:
              type: string
          required:
            - key
            - value
            - band
        netWorth:
          type: integer
        monthlySurplus:
          type: ["integer", "null"]
        partial:
          type: boolean
      required:
        - goalTitle
        - goalCategory
        - focusScore
        - netWorth
        - monthlySurplus
        - partial
    RoadmapObstacle:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        focus:
          type: string
        detail:
          type: string
        value:
          type: ["integer", "null"]
      required:
        - key
        - label
        - focus
        - detail
        - value
    RoadmapOpportunity:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        detail:
          type: string
        monthlyImpact:
          type: ["integer", "null"]
        annualImpact:
          type: ["integer", "null"]
      required:
        - key
        - label
        - detail
        - monthlyImpact
        - annualImpact
    RoadmapPlanStep:
      type: object
      properties:
        id:
          type: integer
        horizon:
          type: string
          enum: ["immediate", "30_day", "90_day", "1_year", "5_year"]
        action:
          type: string
        detail:
          type: ["string", "null"]
        status:
          type: string
        order:
          type: integer
      required:
        - horizon
        - action
        - detail
        - status
        - order
    RoadmapPlan:
      type: object
      properties:
        position:
          $ref: "#/components/schemas/RoadmapPosition"
        primaryObstacle:
          oneOf:
            - $ref: "#/components/schemas/RoadmapObstacle"
            - type: "null"
        opportunities:
          type: array
          items:
            $ref: "#/components/schemas/RoadmapOpportunity"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/RoadmapPlanStep"
      required:
        - position
        - primaryObstacle
        - opportunities
        - steps

    Document:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        status:
          type: string
        orderIndex:
          type: integer
        note:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - category
        - status
        - orderIndex
        - createdAt
    DocumentInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: string
          enum: ["Income", "Assets", "Identity", "Property", "Credit", "Other"]
        status:
          type: string
          enum: ["needed", "in_progress", "complete"]
        orderIndex:
          type: integer
        note:
          type: string
      required:
        - name
    DocumentUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: string
          enum: ["Income", "Assets", "Identity", "Property", "Credit", "Other"]
        status:
          type: string
          enum: ["needed", "in_progress", "complete"]
        orderIndex:
          type: integer
        note:
          type: string

    Opportunity:
      type: object
      properties:
        id:
          type: integer
        kind:
          type: string
        title:
          type: string
        summary:
          type: string
        detail:
          type: ["string", "null"]
        rate:
          type: ["string", "null"]
        term:
          type: ["string", "null"]
        minAmount:
          type: integer
        tag:
          type: ["string", "null"]
        recommended:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - kind
        - title
        - summary
        - minAmount
        - recommended
        - createdAt

    OpportunityMatch:
      type: object
      properties:
        key:
          type: string
        category:
          type: string
        title:
          type: string
        description:
          type: string
        rationale:
          type: string
        status:
          type: string
          enum: ["available", "foundation", "coming_later"]
      required:
        - key
        - category
        - title
        - description
        - rationale
        - status
    OpportunityMatches:
      type: object
      properties:
        goalCategory:
          type: ["string", "null"]
        foundationFirst:
          type: boolean
        matches:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityMatch"
        comingLater:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityMatch"
      required:
        - goalCategory
        - foundationFirst
        - matches
        - comingLater

    ReadinessScore:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        score:
          type: integer
        tier:
          type: string
        summary:
          type: string
        value:
          type: integer
          description: Deterministic engine score 0-100.
        band:
          type: string
          description: Band label for the value (engine).
        partial:
          type: boolean
          description: True when some component data was absent and excluded.
        helpingFactor:
          type: string
          nullable: true
          description: Single biggest helping factor (educational why).
        hurtingFactor:
          type: string
          nullable: true
          description: Single biggest hurting factor (educational why).
      required:
        - key
        - label
        - score
        - tier
        - summary

    DashboardSummary:
      type: object
      properties:
        netWorth:
          type: integer
        monthlyCashflow:
          type: integer
        totalAssets:
          type: integer
        totalDebt:
          type: integer
        activeGoals:
          type: integer
        achievedGoals:
          type: integer
        avgReadiness:
          type: integer
        documentsComplete:
          type: integer
        documentsTotal:
          type: integer
        topScore:
          $ref: "#/components/schemas/ReadinessScore"
        nextStep:
          oneOf:
            - $ref: "#/components/schemas/RoadmapStep"
            - type: "null"
        recommendedOpportunities:
          type: array
          items:
            $ref: "#/components/schemas/Opportunity"
      required:
        - netWorth
        - monthlyCashflow
        - totalAssets
        - totalDebt
        - activeGoals
        - achievedGoals
        - avgReadiness
        - documentsComplete
        - documentsTotal
        - recommendedOpportunities

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
        mode:
          type: string
          enum: ["overlay"]
          description: >-
            Conversation surface. "overlay" routes the coach into Mode B
            (the "Hey Pep" dashboard overlay) and gates persistence behind
            an explicit confirmation.
        section:
          type: string
          description: >-
            The dashboard screen/section the user is viewing, used to give
            the overlay coach screen-aware context.
        commit:
          type: boolean
          description: >-
            Overlay-only. When true, this turn is a confirmed fill: run the
            auth-scoped extraction/persistence pass (and score/roadmap
            recompute) for the signed-in user. Explain/proposal turns omit it.
      required:
        - content
    OpenaiVoiceMessageInput:
      type: object
      properties:
        audio:
          type: string
          description: Base64-encoded audio data
        voice:
          type: string
          enum: ["female", "male"]
      required:
        - audio
    OpenaiTranscribeInput:
      type: object
      properties:
        audio:
          type: string
          description: Base64-encoded audio data
      required:
        - audio
    OpenaiTranscribeOutput:
      type: object
      properties:
        text:
          type: string
      required:
        - text
