kind = "web"
previewPath = "/"
title = "Pepper — Wealth Coach"
version = "1.0.0"
id = "artifacts/pepper"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22379

[services.development]
run = "pnpm --filter @workspace/pepper run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pepper", "run", "build" ]
publicDir = "artifacts/pepper/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22379"
BASE_PATH = "/"
